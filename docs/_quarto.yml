project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "tutorials/*.qmd"
    - "reference/*.qmd"
  preview:
    port: 4200
    browser: false
  resources:
    - "reference/**"

website:
  title: "fmrimod"
  description: "Typed, composable fMRI design and statistical modeling in Python."
  site-url: "https://bbuchsbaum.github.io/fmrimod/"
  repo-url: "https://github.com/bbuchsbaum/fmrimod"
  repo-actions: [edit, issue]
  repo-branch: main
  page-navigation: true
  back-to-top-navigation: true
  bread-crumbs: false
  reader-mode: false
  search:
    location: navbar
    type: overlay
    copy-button: true
  navbar:
    pinned: true
    logo: ""
    # No background:/foreground: — let the SCSS drive the navbar palette.
    left:
      - text: "Get started"
        href: get-started.qmd
      - text: "Tutorials"
        href: tutorials/index.qmd
      - text: "Reference"
        href: reference/index.qmd
      - text: "Mission"
        href: "https://github.com/bbuchsbaum/fmrimod/blob/main/MISSION.md"
    right:
      - icon: github
        href: "https://github.com/bbuchsbaum/fmrimod"
        aria-label: GitHub
  sidebar:
    - id: tutorials
      title: "Tutorials"
      style: floating
      align: left
      contents:
        - tutorials/index.qmd
        - auto: tutorials/*.qmd
    - id: reference
      title: "Reference"
      style: floating
      contents:
        - reference/index.qmd
        - auto: reference/*.qmd
  page-footer:
    border: false
    left: "© 2026 Bradley Buchsbaum"
    right:
      - icon: github
        href: "https://github.com/bbuchsbaum/fmrimod"

format:
  html:
    # Single dark-first theme. One Bootstrap base + the two SCSS layers.
    theme: [darkly, _variables.scss, _variables-dark.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "On this page"
    number-sections: false
    anchor-sections: true
    code-copy: true
    code-overflow: wrap
    code-link: true
    code-annotations: hover
    highlight-style: github-dark
    fig-align: center
    fig-cap-location: bottom
    fig-format: retina
    fig-dpi: 200
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
    citations-hover: true
    footnotes-hover: true
    grid:
      sidebar-width: 260px
      body-width: 860px
      margin-width: 220px
      gutter-width: 1.5rem

execute:
  freeze: auto
  cache: true
  warning: false
  message: false

# Single source of truth for the quartodoc config. Do NOT also declare a
# `quartodoc:` block here — a duplicate shadows the file.
metadata-files:
  - _quartodoc.yml
