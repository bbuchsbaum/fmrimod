name: Release 0.8 Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  python-suite:
    name: Python suite (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" nilearn jsonschema ruff

      - name: Run Python suite without rpy2 parity cases
        run: python -m pytest tests/ -k "not rpy2"

      - name: Run caveat and proof-artifact discipline checks
        run: |
          python -m pytest \
            cross_testing/test_caveats_index.py \
            tests/test_benchmarks/test_parity_proof_artifacts.py -q

      - name: Run 0.8 ruff ratchet
        run: |
          ruff check --select F,E9,I,E501 \
            fmrimod/stats/connectivity.py \
            tests/test_stats/test_connectivity.py \
            fmrimod/spec/terms.py \
            fmrimod/spec/builders.py \
            fmrimod/spec/_compile.py \
            fmrimod/spec/__init__.py \
            fmrimod/spec/serialize.py \
            tests/test_spec/test_spec.py \
            tests/test_spec/test_serialize.py \
            tests/test_glm/test_fmri_lm_spec_dataset.py
