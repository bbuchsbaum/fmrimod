name: Core Parity Matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"

jobs:
  core-parity-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
          pip install nilearn jsonschema

      - name: Build core parity matrix artifact (PR profile, WS01-WS10 computed; WS01/WS02/WS03/WS04/WS05/WS06/WS07/WS08/WS09/WS10 required)
        run: |
          mkdir -p cross_testing/reports
          python cross_testing/benchmark_core_parity_matrix.py \
            --output cross_testing/reports/core_parity_matrix_pr_profile_ci.json \
            --ws01-n-scans 140 \
            --ws01-tr 1.0 \
            --ws01-seed 7 \
            --ws02-n-timepoints 160 \
            --ws02-n-regressors 8 \
            --ws02-n-voxels 900 \
            --ws02-noise-sd 1.0 \
            --ws02-seed 1234 \
            --ws03-n-timepoints 160 \
            --ws03-n-regressors 8 \
            --ws03-n-voxels 900 \
            --ws03-noise-sd 1.0 \
            --ws03-phi 0.45 \
            --ws03-seed 2026 \
            --ws04-n-timepoints 150 \
            --ws04-n-regressors 8 \
            --ws04-n-voxels 800 \
            --ws04-noise-sd 1.0 \
            --ws04-seed 3030 \
            --ws05-n-timepoints 160 \
            --ws05-n-regressors 8 \
            --ws05-n-voxels 900 \
            --ws05-noise-sd 1.0 \
            --ws05-seed 505 \
            --ws06-n-timepoints 180 \
            --ws06-n-trials 40 \
            --ws06-n-voxels 900 \
            --ws06-n-confounds 6 \
            --ws06-noise-sd 1.0 \
            --ws06-seed 6060 \
            --ws06-repeats 2 \
            --ws06-warmup 0 \
            --ws06-chunk-size 2000 \
            --ws07-n-timepoints 160 \
            --ws07-n-regressors 8 \
            --ws07-n-voxels 900 \
            --ws07-noise-sd 1.0 \
            --ws07-seed 7070 \
            --ws08-n-timepoints 160 \
            --ws08-n-regressors 8 \
            --ws08-n-voxels 900 \
            --ws08-noise-sd 1.0 \
            --ws08-seed 8080 \
            --ws09-n-timepoints 160 \
            --ws09-n-regressors 8 \
            --ws09-n-voxels 900 \
            --ws09-noise-sd 1.0 \
            --ws09-phi 0.45 \
            --ws09-seed 9090 \
            --ws10-n-timepoints 160 \
            --ws10-n-regressors 8 \
            --ws10-n-voxels 900 \
            --ws10-noise-sd 1.0 \
            --ws10-phi 0.45 \
            --ws10-seed 5050 \
            --ws10-repeats 2 \
            --ws10-warmup 0 \
            --ws10-design-n-scans 140 \
            --ws10-design-tr 1.0 \
            --ws10-run-combine-runs 4 \
            --require-ws01-ws02 \
            --require-ws03 \
            --require-ws04 \
            --require-ws05 \
            --require-ws06 \
            --require-ws07 \
            --require-ws08 \
            --require-ws09 \
            --require-ws10

      - name: Build core parity matrix artifact (nightly profile, WS01-WS10 computed; WS01/WS02/WS03/WS04/WS05/WS06/WS07/WS08/WS09/WS10 required)
        run: |
          python cross_testing/benchmark_core_parity_matrix.py \
            --output cross_testing/reports/core_parity_matrix_nightly_profile_ci.json \
            --ws01-n-scans 240 \
            --ws01-tr 0.9 \
            --ws01-seed 17 \
            --ws02-n-timepoints 300 \
            --ws02-n-regressors 10 \
            --ws02-n-voxels 2500 \
            --ws02-noise-sd 1.0 \
            --ws02-seed 2234 \
            --ws03-n-timepoints 300 \
            --ws03-n-regressors 10 \
            --ws03-n-voxels 2500 \
            --ws03-noise-sd 1.0 \
            --ws03-phi 0.45 \
            --ws03-seed 3026 \
            --ws04-n-timepoints 260 \
            --ws04-n-regressors 10 \
            --ws04-n-voxels 2200 \
            --ws04-noise-sd 1.0 \
            --ws04-seed 4030 \
            --ws05-n-timepoints 300 \
            --ws05-n-regressors 10 \
            --ws05-n-voxels 2200 \
            --ws05-noise-sd 1.0 \
            --ws05-seed 1505 \
            --ws06-n-timepoints 320 \
            --ws06-n-trials 100 \
            --ws06-n-voxels 2500 \
            --ws06-n-confounds 6 \
            --ws06-noise-sd 1.0 \
            --ws06-seed 7060 \
            --ws06-repeats 3 \
            --ws06-warmup 1 \
            --ws06-chunk-size 4000 \
            --ws07-n-timepoints 300 \
            --ws07-n-regressors 10 \
            --ws07-n-voxels 2500 \
            --ws07-noise-sd 1.0 \
            --ws07-seed 8070 \
            --ws08-n-timepoints 300 \
            --ws08-n-regressors 10 \
            --ws08-n-voxels 2500 \
            --ws08-noise-sd 1.0 \
            --ws08-seed 9080 \
            --ws09-n-timepoints 300 \
            --ws09-n-regressors 10 \
            --ws09-n-voxels 2500 \
            --ws09-noise-sd 1.0 \
            --ws09-phi 0.45 \
            --ws09-seed 10090 \
            --ws10-n-timepoints 300 \
            --ws10-n-regressors 10 \
            --ws10-n-voxels 2500 \
            --ws10-noise-sd 1.0 \
            --ws10-phi 0.45 \
            --ws10-seed 6050 \
            --ws10-repeats 4 \
            --ws10-warmup 1 \
            --ws10-design-n-scans 240 \
            --ws10-design-tr 0.9 \
            --ws10-run-combine-runs 6 \
            --require-ws01-ws02 \
            --require-ws03 \
            --require-ws04 \
            --require-ws05 \
            --require-ws06 \
            --require-ws07 \
            --require-ws08 \
            --require-ws09 \
            --require-ws10

      - name: Validate PR profile artifact schema
        run: |
          python cross_testing/validate_benchmark_schema.py \
            --artifact cross_testing/reports/core_parity_matrix_pr_profile_ci.json \
            --schema cross_testing/schemas/core_parity_benchmark.schema.json

      - name: Validate nightly profile artifact schema
        run: |
          python cross_testing/validate_benchmark_schema.py \
            --artifact cross_testing/reports/core_parity_matrix_nightly_profile_ci.json \
            --schema cross_testing/schemas/core_parity_benchmark.schema.json

      - name: Upload core parity artifact
        uses: actions/upload-artifact@v4
        with:
          name: fmrimod-core-parity-matrix
          path: |
            cross_testing/reports/core_parity_matrix_pr_profile_ci.json
            cross_testing/reports/core_parity_matrix_nightly_profile_ci.json
